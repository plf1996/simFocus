# simFocus Docker Compose Configuration
# Includes PostgreSQL, Redis, and backend application

version: "3.8"

services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: simfocus-postgres
    environment:
      POSTGRES_DB: simfocus
      POSTGRES_USER: simfocus
      POSTGRES_PASSWORD: simfocus_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simfocus -d simfocus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simfocus-network
    restart: unless-stopped

  # =============================================================================
  # Redis (for caching and future use)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: simfocus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simfocus-network
    restart: unless-stopped

  # =============================================================================
  # Backend Application
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simfocus-backend
    environment:
      # Application
      APP_NAME: simFocus
      APP_ENV: development
      DEBUG: true

      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: simfocus
      DATABASE_PASSWORD: simfocus_password
      DATABASE_NAME: simfocus

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password

      # Security
      SECRET_KEY: ${SECRET_KEY:-development-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # JWT
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7

      # CORS
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000

      # API Keys (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Logging
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/home/appuser/app
      - backend_logs:/home/appuser/logs
      - backend_uploads:/home/appuser/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - simfocus-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # =============================================================================
  # pgAdmin (Optional - for database management)
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: simfocus-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@simfocus.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - simfocus-network
    restart: unless-stopped
    profiles:
      - admin

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  pgadmin_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  simfocus-network:
    driver: bridge
